name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -q --tb=short

  graphviz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Render and verify diagrams
        run: bash docs/graphviz/render_all.sh

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        with:
          name: graphviz-rendered
          path: docs/graphviz/rendered/
          retention-days: 14

  build-images:
    runs-on: ubuntu-latest
    needs: [test, graphviz]
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile.api
          - name: ui
            dockerfile: docker/Dockerfile.ui
          - name: mock
            dockerfile: docker/Dockerfile.mock
          - name: etl
            dockerfile: docker/Dockerfile.etl
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-diagnostics-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-diagnostics-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max