apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: diagnostics-secrets
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            # Page cache = Neo4j's in-memory store-file cache: the #1 scaling
            # lever (size to the working set before clustering/sharding).
            # See docs/sdd/10-SCALING-POPULATING-KG.md §2.
            - name: NEO4J_server_memory_pagecache_size
              value: "1G"
            - name: NEO4J_server_memory_heap_initial__size
              value: "1G"
            - name: NEO4J_server_memory_heap_max__size
              value: "2G"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
