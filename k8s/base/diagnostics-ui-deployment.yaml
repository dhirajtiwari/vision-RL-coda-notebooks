apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostics-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diagnostics-ui
  template:
    metadata:
      labels:
        app: diagnostics-ui
    spec:
      containers:
        - name: diagnostics-ui
          image: ghcr.io/OWNER/REPO-diagnostics-ui:latest
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: diagnostics-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diagnostics-secrets
                  key: NEO4J_PASSWORD
          volumeMounts:
            - name: enterprise-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: enterprise-data
          persistentVolumeClaim:
            claimName: enterprise-data