name: Eval Nightly

# Full eval + safety gate against a live Neo4j (kickoff prompt §D/§O, ch04/ch15).
# The PR gate (ci.yml) runs the DB-free safety suite + smoke; this runs the full
# golden suite nightly so quality/drift regressions are caught even without a
# graph in PR CI.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      DEMO_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Populate graph
        run: python -m graph.populate_graph || echo "::warning::graph populate step needs review"
        continue-on-error: true
      - name: Full eval gate
        run: python evals/run_eval.py --suite full --report eval-report.json
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.json
