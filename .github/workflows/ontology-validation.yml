name: ontology-validation

# Merge-blocking ontology gate (Scaling & Populating KG guide, Part 4 / SDD §10).
# Runs on every change to the ontology, the TBox export, the validators, or the
# knowledge catalog — the "spec is the source of truth" discipline applied to the
# ontology. No Neo4j required.

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "graph/rdf_ontology_export.py"
      - "graph/enterprise_pipeline/ontology_validate.py"
      - "graph/enterprise_pipeline/entity_resolution.py"
      - "docs/ontology/**"
      - "data/enterprise_knowledge_catalog.json"
      - "scripts/validate_ontology_ci.py"
      - ".github/workflows/ontology-validation.yml"
  pull_request:
    paths:
      - "graph/rdf_ontology_export.py"
      - "graph/enterprise_pipeline/ontology_validate.py"
      - "graph/enterprise_pipeline/entity_resolution.py"
      - "docs/ontology/**"
      - "data/enterprise_knowledge_catalog.json"
      - "scripts/validate_ontology_ci.py"
      - ".github/workflows/ontology-validation.yml"

permissions:
  contents: read

jobs:
  ontology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps (TBox export + validators + rdflib)
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pydantic-settings rdflib

      - name: TBox Turtle syntax + consistency + ABox shapes (merge-block)
        run: python scripts/validate_ontology_ci.py

      - name: Ontology unit tests (TBox/ABox discipline + entity resolution)
        run: |
          pip install pytest
          pytest tests/test_warranty_ontology.py tests/test_rdf_ontology_export.py \
            tests/test_entity_resolution.py tests/test_llm_extract.py -q
