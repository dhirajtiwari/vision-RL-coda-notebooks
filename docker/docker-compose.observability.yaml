# Local observability stack (kickoff prompt §H) — OPT-IN, now fully wired.
#
#   docker compose -f docker/docker-compose.observability.yaml up -d
#
# Then start the API with tracing on so traces reach the collector:
#   OTEL_ENABLED=true OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 \
#     uvicorn api.main:app --port 8080
#
# What you get (all working end-to-end, unlike the previous stub):
#   - OTel Collector   : receives OTLP, redacts PII, fans out to Tempo + Prometheus
#   - Prometheus :9090 : scrapes the API /metrics (host) + collector, loads SLO rules
#   - Tempo      :3200 : stores traces from the collector
#   - Grafana    :3001 : auto-provisioned Prometheus + Tempo datasources + dashboards
#
# The API runs on the HOST (uvicorn), so Prometheus reaches it via the
# host-gateway alias (host.docker.internal) added to each service below.
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ../monitoring/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (point the API here)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (scraped by prometheus below)
    depends_on:
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      # Main scrape config (was missing before — Prometheus scraped nothing).
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # SLO alert + recording rules.
      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux parity for scraping the host API
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API (Grafana datasource)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin        # local only; use a secret in prod
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true          # read-only view without login (local)
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"   # Grafana UI at http://localhost:3001 (3000 is the Next.js UI)
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  tempo-data:
  grafana-data:
