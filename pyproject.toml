# ─────────────────────────────────────────────────────────────────────────────
# Python tooling config (ruff = linter + formatter, replaces flake8/black/isort)
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [
    "venv",
    ".venv",
    "frontend",               # JS/TS handled by ESLint
]

[tool.ruff.lint]
# Focused, high-signal, auto-fixable rule set — avoids noisy churn.
select = [
    "F",    # pyflakes  — real bugs (undefined names, unused imports)
    "I",    # isort     — import ordering (auto-fix)
    "UP",   # pyupgrade — modern syntax (auto-fix)
    "B",    # bugbear   — likely bugs
    "C4",   # comprehensions
    "SIM",  # simplifications
]
ignore = [
    "B008",   # function call in default arg (FastAPI Depends pattern)
    "SIM108", # ternary — readability preference
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811"]   # test fixtures / re-imports

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"

# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
branch = true
source = [
    "agents",
    "api",
    "config",
    "domain",
    "finops",
    "gateway",
    "guardrails",
    "observability",
    "promptops",
    "services",
    "utils",
]
omit = [
    "*/__init__.py",
    "tests/*",
    "venv/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
# Raise this floor as coverage grows; keep it enforceable in CI.
fail_under = 0
