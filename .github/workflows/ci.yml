name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main, "feature/**"]

permissions:
  contents: read
  packages: write
  # gitleaks-action on pull_request lists PR commits via the GitHub API
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan (kickoff prompt §M)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Dependency vulnerability scan (supply chain, ch13)
        run: pip-audit -r requirements.txt --strict || echo "::warning::pip-audit found advisories (non-blocking)"
        continue-on-error: true

      - name: Multi-source packs + TBox/ABox discipline (no Neo4j required)
        # Gates for hmd-001 / esp-001 source inventory, OntologyBuilder rich ABox,
        # shape validation under shared TBox, tbox_extension detection, change preview.
        run: |
          pytest tests/test_multi_source_tbox_abox.py tests/test_pipeline_integration.py \
            tests/test_kg_ingestion_pipelines.py tests/test_warranty_ontology.py \
            tests/test_rdf_ontology_export.py tests/test_runtime.py \
            -q --tb=short

      - name: Run tests (with coverage)
        run: pytest tests/ -q --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Eval gate (safety + golden if graph available)
        # Safety suite (injection/jailbreak) is DB-free and always runs; the
        # golden suite auto-skips when Neo4j is absent in CI. A nightly job runs
        # the full gate against a live graph (see eval-nightly.yml).
        run: python evals/run_eval.py --suite smoke

      - name: Docs present for multi-source / TBox mechanism
        run: |
          test -f docs/22-TBox-ABox-Multi-Source-Onboard-Mechanism.md
          test -f data/pipeline_sources/ESP_001_MULTI_SOURCE_MANIFEST.json
          test -f data/pipeline_sources/HMD_001_MULTI_SOURCE_MANIFEST.json
          grep -q "TBox" docs/22-TBox-ABox-Multi-Source-Onboard-Mechanism.md
          grep -q "esp-001" todo.md
          grep -q "26. Gap research" todo.md || grep -q "Gap research" todo.md

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Use `npm install` (not `npm ci`): Tailwind v4's oxide engine pulls in
        # @napi-rs/wasm-runtime whose optional @emnapi/* sub-deps are recorded as
        # references but not resolved packages, making `npm ci` strict validation
        # fail on all platforms (known npm bug). `npm install` reconciles the
        # committed lockfile deterministically and is cross-platform safe.
        run: npm install --no-audit --no-fund

      - name: Lint (non-blocking — reports style issues)
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  graphviz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Render and verify diagrams
        run: bash docs/graphviz/render_all.sh

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        with:
          name: graphviz-rendered
          path: docs/graphviz/rendered/
          retention-days: 14

  codeql:
    # SAST for application code (kickoff prompt §M). Results in the Security tab.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  vuln-scan:
    # Repo/dependency + IaC misconfiguration scan on every PR (reports to Security
    # tab; the blocking image scan lives in build-images). Kickoff prompt §M.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem + config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  build-images:
    runs-on: ubuntu-latest
    needs: [test, frontend, graphviz]
    permissions:
      contents: read
      packages: write        # push to GHCR
      id-token: write        # cosign keyless (OIDC) signing
      security-events: write # upload Trivy SARIF to the Security tab
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile.api
          - name: frontend
            dockerfile: docker/Dockerfile.frontend
          - name: mock
            dockerfile: docker/Dockerfile.mock
          - name: etl
            dockerfile: docker/Dockerfile.etl
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image prefix
        # GHCR/Docker require lowercase repository names; github.repository can
        # contain uppercase (e.g. remote-diagnostics-graphDB).
        run: echo "IMAGE_PREFIX_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}-diagnostics-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}-diagnostics-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit attaches an SPDX SBOM + SLSA provenance attestation to the
          # pushed image (kickoff §M). Verify later with `cosign verify-attestation`.
          sbom: true
          provenance: mode=max

      - name: Scan image for vulnerabilities (Trivy — fail on HIGH/CRITICAL)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}-diagnostics-${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # base-image CVEs with no fix don't block; app CVEs do
          exit-code: "1"

      - name: Upload Trivy image SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image (keyless, OIDC — no long-lived keys)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_YES: "true"
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}-diagnostics-${{ matrix.name }}@${{ steps.build.outputs.digest }}"
          cosign sign "$IMG"
          echo "Signed $IMG"
