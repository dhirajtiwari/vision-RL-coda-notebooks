apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostics-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diagnostics-api
  template:
    metadata:
      labels:
        app: diagnostics-api
      annotations:
        # Fallback scraping for annotation-based Prometheus setups. With the
        # Prometheus Operator, the ServiceMonitor in k8s/monitoring/ is preferred.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: diagnostics-api
          image: ghcr.io/OWNER/REPO-diagnostics-api:latest
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              memory: 512Mi
              ephemeral-storage: 1Gi
          envFrom:
            - configMapRef:
                name: diagnostics-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diagnostics-secrets
                  key: NEO4J_PASSWORD
          volumeMounts:
            - name: enterprise-data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: enterprise-data
          persistentVolumeClaim:
            claimName: enterprise-data
        - name: tmp
          emptyDir: {}
