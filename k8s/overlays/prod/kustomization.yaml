apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: diagnostics-prod

resources:
  - ../../base

patches:
  - path: patch-namespace.yaml
  - path: patch-prod-config.yaml
  - path: patch-replicas.yaml
  - path: patch-mock-scale.yaml

images:
  - name: ghcr.io/OWNER/REPO-diagnostics-api
    newTag: latest
  - name: ghcr.io/OWNER/REPO-diagnostics-ui
    newTag: latest
  - name: ghcr.io/OWNER/REPO-diagnostics-mock
    newTag: latest
  - name: ghcr.io/OWNER/REPO-diagnostics-etl
    newTag: latest