# Prometheus alert + recording rules (kickoff prompt §I/§O, handbook ch09/ch15)
# SLO-aligned alerts. Metric names match observability/metrics.py so the SAME
# definitions back eval gates, SLOs, canary analysis, and these alerts.

groups:
  - name: diagnostics-slo
    rules:
      # --- Availability / errors ---
      - alert: DiagnoseHighErrorRate
        expr: |
          sum(rate(diagnostics_requests_total{route="/diagnose",status=~"5.."}[5m]))
          / sum(rate(diagnostics_requests_total{route="/diagnose"}[5m])) > 0.05
        for: 10m
        labels: {severity: critical}
        annotations:
          summary: "/diagnose 5xx error rate > 5% (10m)"
          runbook: docs/runbooks/provider-outage.md

      # --- Latency SLO: p95 < 2s ---
      - alert: DiagnoseLatencyP95High
        expr: |
          histogram_quantile(0.95,
            sum(rate(diagnostics_request_latency_seconds_bucket{route="/diagnose"}[5m])) by (le)
          ) > 2
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "/diagnose p95 latency > 2s (10m)"
          runbook: docs/runbooks/latency-regression.md

      # --- Quality: diagnosis confidence dropping (drift signal) ---
      - alert: DiagnosisConfidenceDrop
        expr: |
          histogram_quantile(0.5,
            sum(rate(diagnostics_diagnosis_confidence_bucket[30m])) by (le)
          ) < 0.4
        for: 30m
        labels: {severity: warning}
        annotations:
          summary: "Median diagnosis confidence < 0.40 (30m) — possible model/graph drift"
          runbook: docs/runbooks/quality-regression.md

      # --- Escalation surge (quality or graph freshness problem) ---
      - alert: EscalationSurge
        expr: |
          sum(rate(diagnostics_escalations_total[15m]))
          / sum(rate(diagnostics_requests_total{route="/diagnose"}[15m])) > 0.5
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: ">50% of diagnoses escalating (15m) — check graph freshness"
          runbook: docs/runbooks/rag-stale.md

      # --- FinOps: LLM cost spike (optional LLM path) ---
      - alert: LLMCostSpike
        expr: increase(diagnostics_llm_cost_usd_total[1h]) > 2
        for: 5m
        labels: {severity: warning}
        annotations:
          summary: "LLM spend > $2/hour — check for runaway loop"
          runbook: docs/runbooks/cost-spike.md
