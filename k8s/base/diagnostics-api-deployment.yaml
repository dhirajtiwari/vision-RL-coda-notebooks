apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostics-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diagnostics-api
  template:
    metadata:
      labels:
        app: diagnostics-api
    spec:
      containers:
        - name: diagnostics-api
          image: ghcr.io/OWNER/REPO-diagnostics-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: diagnostics-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diagnostics-secrets
                  key: NEO4J_PASSWORD
          volumeMounts:
            - name: enterprise-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: enterprise-data
          persistentVolumeClaim:
            claimName: enterprise-data