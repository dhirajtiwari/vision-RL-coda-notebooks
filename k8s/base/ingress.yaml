apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: diagnostics-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: diagnostics.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: diagnostics-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: diagnostics-ui
                port:
                  number: 8501